name: Convex Deploy (Production)

on:
    push:
        branches:
            - main
    workflow_dispatch: {}

concurrency:
    group: convex-main-${{ github.ref }}
    cancel-in-progress: true

jobs:
    deploy:
        name: Deploy Convex to production deployment
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22.22.0

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.8

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Deploy Convex (deploy)
              working-directory: packages/convex
              env:
                  # Deployment key for the Convex B prod deployment.
                  # Store in GitHub Secrets as CONVEX_DEPLOY_KEY_PROD.
                  CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY_PROD }}
              run: |
                  if [ -z "$CONVEX_DEPLOY_KEY" ]; then
                    echo "CONVEX_DEPLOY_KEY_PROD is not set; skipping Convex deploy."
                    exit 0
                  fi
                  bunx convex deploy --yes --codegen=disable

name: Convex Deploy (Preview)

on:
    push:
        branches:
            - preview
    workflow_dispatch: {}

concurrency:
    group: convex-preview-${{ github.ref }}
    cancel-in-progress: true

jobs:
    deploy:
        name: Deploy Convex to preview deployment
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22.22.0

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.8

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Deploy Convex (dev --once)
              working-directory: packages/convex
              env:
                  # Deployment key for the Convex B dev deployment.
                  # Store in GitHub Secrets as CONVEX_DEPLOY_KEY_PREVIEW.
                  CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY_PREVIEW }}
              run: |
                  if [ -z "$CONVEX_DEPLOY_KEY" ]; then
                    echo "CONVEX_DEPLOY_KEY_PREVIEW is not set; skipping Convex deploy."
                    exit 0
                  fi
                  bunx convex dev --once --codegen=disable --tail-logs=disable

name: CI

on:
    pull_request:
    push:
        branches:
            - main
    workflow_dispatch: {}

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    health:
        name: Typecheck · Lint · Test · Format · Build
        runs-on: ubuntu-latest
        timeout-minutes: 15

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22.22.0

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.8

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Env-vars docs check
              run: bun run env:check

            - name: Typecheck (apps/web)
              run: bun run --cwd apps/web typecheck

            - name: Typecheck (packages/shared)
              run: bun run --cwd packages/shared typecheck

            - name: Typecheck (packages/convex)
              run: bun run --cwd packages/convex typecheck

            - name: Lint (apps/web)
              run: bun run --cwd apps/web lint

            - name: Lint (packages/shared)
              run: bun run --cwd packages/shared lint

            - name: Lint (packages/convex)
              run: bun run --cwd packages/convex lint

            - name: Format check
              run: bun run format:check

            - name: Test (apps/web)
              run: bun run --cwd apps/web test

            - name: Test (packages/shared)
              run: bun run --cwd packages/shared test

            - name: Test (packages/convex)
              run: bun run --cwd packages/convex test

            - name: Build (apps/web)
              working-directory: apps/web
              env:
                  NEXT_TELEMETRY_DISABLED: "1"
              run: bun run build
